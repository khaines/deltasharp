version: 2

# Keeps SHA-pinned GitHub Actions and centrally-managed NuGet versions current.
# Pinning actions to commit SHAs (see .github/workflows/*) is only safe if something
# updates them — Dependabot bumps the pins (with provenance) and the central package
# versions. Dependabot commits are DCO-exempt by author (see tools/dco-check.sh).
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
    groups:
      nuget:
        patterns:
          - "*"
