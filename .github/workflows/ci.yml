name: CI

# Build, test, and format gate for every pull request and for pushes to main.
#
# This workflow intentionally has NO `paths:` filter. Its jobs are intended to be
# required by branch protection, so they must always report a status — even for
# docs-only changes — otherwise the merge button can deadlock waiting for a check
# that never runs. Keeping the build fast (an inert skeleton) makes always-on cheap.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-format:
    name: build-test-format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Install the runtimes needed to build AND run both target frameworks
      # (ADR-0014). global.json pins the SDK used by `dotnet` to the 10.0.1xx band;
      # the 8.0.x install provides the net8.0 runtime so net8.0 tests can execute.
      - name: Setup .NET (net8 runtime + pinned SDK)
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          # Install the net8.0 runtime (to run net8.0 tests) plus the exact SDK pinned
          # by global.json, so CI stays in lockstep with the rollForward policy and a
          # future feature-band rollout cannot silently break the build.
          dotnet-version: 8.0.x
          global-json-file: global.json

      # Cache the global NuGet package folder. The key is derived from the project
      # files and central package-management files, so it only changes when
      # dependencies change (STORY-00.1.2).
      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'Directory.Build.props', 'global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore DeltaSharp.sln --locked-mode

      - name: Build (Release)
        run: dotnet build DeltaSharp.sln -c Release --no-restore

      - name: Test
        run: dotnet test DeltaSharp.sln -c Release --no-build --verbosity normal

      - name: Format (verify no changes)
        run: dotnet format DeltaSharp.sln --verify-no-changes --no-restore

  # Coverage runs in a SEPARATE job from build-test-format on purpose (STORY-00.2.3). coverlet
  # instruments the production assemblies at run time, which perturbs execution timing; the
  # authoritative correctness (pass/fail) gate is build-test-format, which runs the tests
  # UNINSTRUMENTED — exactly as before this change — so coverage instrumentation can never alter
  # the correctness verdict. This job measures merged line coverage and enforces the threshold.
  # It runs in parallel with build-test-format (no `needs:`) so it adds no wall-clock latency.
  coverage:
    name: coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup .NET (net8 runtime + pinned SDK)
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 8.0.x
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'Directory.Build.props', 'global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore DeltaSharp.sln --locked-mode

      - name: Build (Release)
        run: dotnet build DeltaSharp.sln -c Release --no-restore

      # Delete any pre-existing coverage output so the gate trusts ONLY reports generated by
      # the collect step below in THIS run. A checkout is normally clean, but this makes the
      # provenance guarantee explicit and closes stale-report reuse (and blocks a report
      # planted before the run from being unioned into the merged set).
      - name: Clean stale coverage reports
        run: rm -rf TestResults

      # Collect line coverage with coverlet (Cobertura, one report per test assembly/TFM under
      # TestResults/). WHAT is measured is defined by coverlet.runsettings. This step is
      # MEASUREMENT ONLY — correctness is gated by build-test-format — hence:
      #   * continue-on-error: a test that only flakes UNDER instrumentation (coverlet widens
      #     timing windows) must never fail the build here; the uninstrumented build-test-format
      #     job is the correctness authority. coverlet still writes complete reports when a test
      #     fails, so the gate below runs on full data (and a truly missing report fails the gate).
      #   * The SparkSession B2/F1 lifecycle TOCTOU tests now run INSTRUMENTED here (no --filter
      #     exclusion): #454 rewrote GetOrCreate_RacingStop from a 25k-iteration stress test with a
      #     post-return (instrumentation-timing-sensitive) oracle into a deterministic probe-driven
      #     test whose oracle observes state strictly inside the in-lock decision window, so coverlet
      #     instrumentation can no longer amplify it into a false failure.
      - name: Collect coverage (measurement only)
        continue-on-error: true
        run: >-
          dotnet test DeltaSharp.sln -c Release --no-build --verbosity normal
          --collect:"XPlat Code Coverage"
          --settings coverlet.runsettings
          --results-directory TestResults

      # Regression-test the gate's own exit-code contract (fail-closed on missing/unexpected
      # assemblies, rounding-boundary, malformed/empty) before trusting it on real data. Python
      # stdlib unittest — no dependency; a broken gate fails the build loudly here.
      - name: Coverage gate self-test
        run: python3 tools/coverage/coverage-gate-selftest.py

      # Merge the per-assembly/per-TFM Cobertura reports by unioning per-line hits and FAIL when
      # merged line coverage is below the floor in tools/coverage/coverage-config.json (the single
      # source of truth). The measured value and the threshold are printed and annotated so a
      # failure is actionable. Python 3 stdlib only (preinstalled) — deterministic and offline.
      - name: Coverage gate (line threshold)
        run: >-
          python3 tools/coverage/coverage-gate.py
          --results-dir TestResults
          --summary-out TestResults/coverage-summary.md

      # Publish the Cobertura reports + merged summary as a workflow artifact (STORY-00.2.3 AC1),
      # even when the gate fails, so a contributor can inspect which lines regressed.
      - name: Upload coverage report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: |
            TestResults/**/coverage.cobertura.xml
            TestResults/coverage-summary.md
          if-no-files-found: warn
