name: NativeAOT

# Representative NativeAOT publish gate for the executor host.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: aot-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-aot:
    name: publish-aot
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup .NET (pinned SDK)
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'Directory.Build.props', 'global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      # NativeAOT publish. The restore here is intentionally NOT --locked-mode: a PublishAot
      # publish pulls the RID-specific NativeAOT toolchain (Microsoft.DotNet.ILCompiler and
      # runtime.linux-x64.Microsoft.DotNet.ILCompiler), which are SDK-band-pinned and
      # Microsoft-signed (resolved via the global.json SDK pin). Forcing those into a
      # packages.lock.json would reintroduce the SDK-version coupling the repo deliberately
      # avoids for build-time toolchain packages (cf. Microsoft.NET.ILLink.Tasks). Third-party
      # dependency pinning is already enforced on this same commit by the required CI job
      # (build-test-format restores the solution with --locked-mode); this is a discard-only
      # trim/AOT-regression gate — the binary is asserted, never signed or published.
      # -warnaserror fails the publish on any IL2xxx/IL3xxx trim/AOT warning.
      - name: Publish executor (NativeAOT linux-x64)
        run: dotnet publish src/DeltaSharp.Executor -c Release -r linux-x64 -p:PublishAot=true -p:TreatWarningsAsErrors=true -warnaserror

      - name: Assert expected executable
        run: |
          publish_path="src/DeltaSharp.Executor/bin/Release/net10.0/linux-x64/publish/DeltaSharp.Executor"
          test -x "$publish_path"
          echo "NativeAOT executable: $publish_path"

      - name: Assert codegen tier elided and interpreted backend selected (ADR-0001)
        run: |
          publish_path="src/DeltaSharp.Executor/bin/Release/net10.0/linux-x64/publish/DeltaSharp.Executor"
          # AC2/AC5: on a NativeAOT host (no dynamic code) the executor must select the
          # interpreted backend and still evaluate the kernel correctly.
          output="$("$publish_path")"
          echo "$output"
          echo "$output" | grep -qF "interpreted-vectorized (dynamic-code=False)"
          echo "$output" | grep -qF "affine(20)=41"
          # AC3: the optional CompiledBackend must be dead-code-eliminated from the native image.
          # Use `strings`, not `nm`: NativeAOT strips managed type names from the binary symbol table,
          # so `nm` yields a false-negative (a leaked managed type is invisible to it). The type name
          # does remain in the image metadata, which `strings` surfaces.
          #
          # Use a plain fixed-string substring match, NOT a delimiter-bounded regex: NativeAOT packs
          # metadata strings, so the type name can appear abutting the next symbol with no delimiter
          # (e.g. `CompiledBackendgC`). A bounded pattern would fail OPEN there; a substring match
          # stays fail-closed and still matches. (`CompiledBackend` is not a substring of the sibling
          # `InterpretedVectorizedBackend`, so the positive control below is unaffected.)
          #
          # Positive control first: confirm `strings` can actually see a reachable backend type name
          # (InterpretedVectorizedBackend). If it cannot, type metadata is stripped and an "absent
          # CompiledBackend" result would be vacuous — fail closed rather than pass blindly (the
          # false-negative class that makes `nm` unsuitable here).
          if ! strings -a "$publish_path" | grep -qF 'InterpretedVectorizedBackend'; then
            echo "ERROR: positive control failed — strings cannot see backend type metadata, so the elision check is unreliable." >&2
            exit 1
          fi
          if strings -a "$publish_path" | grep -qF 'CompiledBackend'; then
            echo "ERROR: CompiledBackend metadata found in the NativeAOT image — codegen tier was not elided." >&2
            exit 1
          fi
          echo "Verified: CompiledBackend elided; interpreted backend selected under NativeAOT."
