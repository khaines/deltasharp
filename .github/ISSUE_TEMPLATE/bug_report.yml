name: Bug report
description: Report a defect so maintainers can reproduce, triage, and fix it.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Complete, minimal, and
        reproducible reports get triaged fastest.

        > [!CAUTION]
        > **Do not report security vulnerabilities here.** Public issues must not
        > contain exploit details. Follow the
        > [Security Policy](https://github.com/khaines/deltasharp/security/policy)
        > and report privately instead.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      description: Please confirm the following before filing.
      options:
        - label: I searched [existing issues](https://github.com/khaines/deltasharp/issues) and did not find a duplicate.
          required: true
        - label: This is a functional bug, **not** a security vulnerability (those are reported privately per [SECURITY.md](https://github.com/khaines/deltasharp/security/policy)).
          required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Describe the incorrect result, exception, or crash. Redact any secrets.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal, deterministic steps to reproduce. A small self-contained code snippet is ideal.
      placeholder: |
        1. Create a `SparkSession` with ...
        2. Run `df.Select(...)` ...
        3. Call `.Collect()` / `.Show()` ...
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Fill in as much as applies. Run `dotnet --version` for the SDK.
      value: |
        - DeltaSharp version or commit SHA:
        - .NET SDK (`dotnet --version`):
        - Target framework (`net8.0` / `net10.0`):
        - OS and architecture:
        - Runtime (local process / Kubernetes):
        - Storage backend (local / S3 / ADLS / GCS / PVC):
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs and output
      description: Console output, stack traces, or logs. This is rendered as code, so no backticks are needed. Redact secrets, credentials, and tenant identifiers.
      render: text
    validations:
      required: false
